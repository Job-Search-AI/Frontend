<!DOCTYPE html>
<html lang="ko" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Career Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        box-sizing: border-box;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .gradient-bg {
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e293b 50%,
          #334155 100%
        );
      }

      .glass-card {
        background: rgba(30, 41, 59, 0.6);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(148, 163, 184, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      .neon-border {
        border: 1px solid rgba(59, 130, 246, 0.3);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.2),
          inset 0 0 20px rgba(59, 130, 246, 0.05);
      }

      .message-enter {
        animation: messageSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes messageSlide {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .job-card {
        background: linear-gradient(
          135deg,
          rgba(59, 130, 246, 0.1) 0%,
          rgba(147, 51, 234, 0.1) 100%
        );
        border: 1px solid rgba(59, 130, 246, 0.2);
        transition: all 0.3s ease;
      }

      .job-card:hover {
        transform: translateY(-4px);
        border-color: rgba(59, 130, 246, 0.5);
        box-shadow: 0 12px 40px rgba(59, 130, 246, 0.3);
      }

      .typing-dots {
        display: flex;
        gap: 6px;
        padding: 20px;
      }

      .typing-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        animation: dotBounce 1.4s infinite ease-in-out;
      }

      .typing-dot:nth-child(1) {
        animation-delay: 0s;
      }
      .typing-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes dotBounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        30% {
          transform: translateY(-12px);
          opacity: 1;
        }
      }

      .btn-primary {
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .btn-primary::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transition: left 0.5s;
      }

      .btn-primary:hover::before {
        left: 100%;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 40px rgba(59, 130, 246, 0.5);
      }

      .input-modern {
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.2);
        transition: all 0.3s ease;
      }

      .input-modern:focus {
        background: rgba(30, 41, 59, 0.95);
        border-color: rgba(59, 130, 246, 0.5);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .scroll-custom::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      .scroll-custom::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.5);
      }

      .scroll-custom::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border-radius: 10px;
      }

      .scroll-custom::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      }

      .badge {
        background: rgba(59, 130, 246, 0.2);
        border: 1px solid rgba(59, 130, 246, 0.3);
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
        color: #93c5fd;
      }
    </style>
    <style>
      @view-transition {
        navigation: auto;
      }
    </style>
  </head>
  <body class="h-full">
    <div
      id="app"
      class="h-full w-full flex flex-col gradient-bg overflow-hidden"
    >
      <!-- Main Chat Area -->
      <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="glass-card px-8 py-6 border-b border-gray-700">
          <div class="flex items-center gap-4">
            <div
              class="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl neon-border"
            >
              🎯
            </div>
            <div>
              <h1 id="site-title" class="text-3xl font-bold text-white mb-1">
                AI Career Finder
              </h1>
              <p id="site-subtitle" class="text-sm text-gray-400">
                당신의 커리어를 위한 최적의 기회를 찾아드립니다
              </p>
            </div>
          </div>
        </header>
        <!-- Chat Messages -->
        <div
          id="chat-container"
          class="flex-1 overflow-y-auto scroll-custom px-8 py-6"
        >
          <div id="chat-messages" class="max-w-5xl mx-auto space-y-6">
            <!-- Welcome Message -->
            <div class="message-enter flex gap-4">
              <div
                class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl glass-card flex-shrink-0"
              >
                🤖
              </div>
              <div class="flex-1">
                <div class="glass-card rounded-2xl p-6 neon-border">
                  <p class="text-gray-300 leading-relaxed">
                    안녕하세요! AI 채용공고 검색 플랫폼입니다. 🚀<br /><br />
                    원하시는
                    <span class="text-blue-400 font-semibold"
                      >직무, 지역, 경력</span
                    >
                    등�� 조건을 입력해주시면<br />
                    최적의 채용공고를 찾아드리겠습니다.<br /><br />
                    예시:
                    <span class="text-purple-400"
                      >"서울, 백엔드 개발자, 3년 경력"</span
                    >
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- Input Area -->
        <div class="glass-card border-t border-gray-700 px-8 py-6">
          <form id="chat-form" class="max-w-5xl mx-auto">
            <div class="flex gap-4">
              <input
                type="text"
                id="user-input"
                placeholder="원하는 직무, 지역, 경력 등을 입력하세요..."
                class="flex-1 px-6 py-4 rounded-xl input-modern text-white placeholder-gray-500 focus:outline-none text-base"
                aria-label="채용 조건 입력"
                required
              />
              <button
                type="submit"
                id="send-button"
                class="px-8 py-4 rounded-xl font-bold text-white btn-primary disabled:opacity-50 disabled:cursor-not-allowed"
              >
                <span class="flex items-center gap-2">
                  <span id="button-text">검색</span> <span>🔍</span>
                </span>
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>
    <script>
      const defaultConfig = {
        background_color: "#0f172a",
        surface_color: "#1e293b",
        text_color: "#e2e8f0",
        primary_action_color: "#3b82f6",
        secondary_action_color: "#1e40af",
        font_family: "sans-serif",
        font_size: 16,
        site_title: "AI Career Finder",
        site_subtitle: "당신의 커리어를 위한 최적의 기회를 찾아드립니다",
        placeholder_text: "원하는 직무, 지역, 경력 등을 입력하세요...",
        send_button_text: "검색",
      };

      let isProcessing = false;

      const jobPostings = [
        {
          company: "테크스타트업",
          title: "시니어 백엔드 개발자",
          location: "서울 강남구",
          experience: "3년 이상",
          skills: ["Python", "Django", "AWS"],
          salary: "5000만원 ~ 7000만원",
          type: "정규직",
        },
        {
          company: "네이버",
          title: "백엔드 개발자",
          location: "경기 성남시",
          experience: "3년 이상",
          skills: ["Java", "Spring", "Kubernetes"],
          salary: "6000만원 ~ 8000만원",
          type: "정규직",
        },
        {
          company: "카카오",
          title: "프론트엔드 개발자",
          location: "서울 판교",
          experience: "2년 이상",
          skills: ["React", "TypeScript", "Next.js"],
          salary: "5500만원 ~ 7500만원",
          type: "정규직",
        },
        {
          company: "쿠팡",
          title: "풀스택 개발자",
          location: "서울 송파구",
          experience: "4년 이상",
          skills: ["Node.js", "React", "AWS"],
          salary: "7000만원 ~ 9000만원",
          type: "정규직",
        },
        {
          company: "토스",
          title: "백엔드 개발자",
          location: "서울 강남구",
          experience: "3년 이상",
          skills: ["Kotlin", "Spring Boot", "Docker"],
          salary: "6500만원 ~ 8500만원",
          type: "정규직",
        },
        {
          company: "라인",
          title: "데이터 엔지니어",
          location: "서울 강남구",
          experience: "2년 이상",
          skills: ["Python", "Spark", "Kafka"],
          salary: "5000만원 ~ 7000만원",
          type: "정규직",
        },
      ];

      function findMatchingJobs(conditions) {
        const lowerConditions = conditions.toLowerCase();
        const matches = jobPostings.filter((job) => {
          const searchText = `${job.company} ${job.title} ${job.location} ${
            job.experience
          } ${job.skills.join(" ")}`.toLowerCase();
          const keywords = lowerConditions
            .split(/[\s,]+/)
            .filter((k) => k.length > 1);
          return keywords.some((keyword) => searchText.includes(keyword));
        });
        return matches.length > 0 ? matches.slice(0, 3) : [];
      }

      function generateJobCards(jobs) {
        return jobs
          .map(
            (job) => `
        <div class="job-card rounded-2xl p-6 mb-4">
          <div class="flex items-start justify-between mb-4">
            <div>
              <h3 class="text-xl font-bold text-white mb-2">${job.title}</h3>
              <p class="text-blue-400 font-semibold text-lg">${job.company}</p>
            </div>
            <span class="badge">${job.type}</span>
          </div>
          
          <div class="space-y-3 mb-4">
            <div class="flex items-center gap-3 text-gray-300">
              <span class="text-xl">📍</span>
              <span>${job.location}</span>
            </div>
            <div class="flex items-center gap-3 text-gray-300">
              <span class="text-xl">💼</span>
              <span>${job.experience}</span>
            </div>
            <div class="flex items-center gap-3 text-gray-300">
              <span class="text-xl">💰</span>
              <span>${job.salary}</span>
            </div>
          </div>
          
          <div class="flex flex-wrap gap-2">
            ${job.skills
              .map(
                (skill) => `
              <span class="px-3 py-1 rounded-lg text-xs font-semibold" style="background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3);">
                ${skill}
              </span>
            `
              )
              .join("")}
          </div>
        </div>
      `
          )
          .join("");
      }

      function generateBotResponse(conditions) {
        const matches = findMatchingJobs(conditions);

        if (matches.length === 0) {
          return {
            type: "text",
            content:
              "죄송합니다. 입력하신 조건에 맞는 채용공고를 찾지 못했습니다. ����<br><br>다른 조건으로 다시 검색해보시겠어요?",
          };
        }

        return {
          type: "jobs",
          content:
            `<div class="mb-4"><p class="text-lg font-semibold text-white mb-2">✨ ${matches.length}개의 채용공고를 찾았습니다!</p><p class="text-gray-400">조건에 맞는 최적의 기회들을 준비했습니다.</p></div>` +
            generateJobCards(matches),
        };
      }

      function addMessage(content, isUser) {
        const messagesContainer = document.getElementById("chat-messages");
        const messageDiv = document.createElement("div");
        messageDiv.className = "message-enter flex gap-4";

        if (isUser) {
          messageDiv.innerHTML = `
          <div class="flex-1"></div>
          <div class="glass-card rounded-2xl p-5 max-w-2xl" style="background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3);">
            <p class="text-white leading-relaxed">${content}</p>
          </div>
          <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl glass-card flex-shrink-0">
            👤
          </div>
        `;
        } else {
          messageDiv.innerHTML = `
          <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl glass-card flex-shrink-0">
            🤖
          </div>
          <div class="flex-1">
            <div class="glass-card rounded-2xl p-6 neon-border">
              ${content}
            </div>
          </div>
        `;
        }

        messagesContainer.appendChild(messageDiv);

        const container = document.getElementById("chat-container");
        container.scrollTop = container.scrollHeight;
      }

      function showTypingIndicator() {
        const messagesContainer = document.getElementById("chat-messages");
        const typingDiv = document.createElement("div");
        typingDiv.id = "typing-indicator";
        typingDiv.className = "flex gap-4";
        typingDiv.innerHTML = `
        <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl glass-card flex-shrink-0">
          🤖
        </div>
        <div class="glass-card rounded-2xl neon-border">
          <div class="typing-dots">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      `;
        messagesContainer.appendChild(typingDiv);

        const container = document.getElementById("chat-container");
        container.scrollTop = container.scrollHeight;
      }

      function hideTypingIndicator() {
        const indicator = document.getElementById("typing-indicator");
        if (indicator) indicator.remove();
      }

      async function handleSubmit(e) {
        e.preventDefault();

        if (isProcessing) return;

        const input = document.getElementById("user-input");
        const submitButton = document.getElementById("send-button");
        const userMessage = input.value.trim();

        if (!userMessage) return;

        isProcessing = true;
        submitButton.disabled = true;

        addMessage(userMessage, true);
        input.value = "";

        showTypingIndicator();

        await new Promise((resolve) => setTimeout(resolve, 1800));

        const response = generateBotResponse(userMessage);

        hideTypingIndicator();

        addMessage(response.content, false);

        isProcessing = false;
        submitButton.disabled = false;
        input.focus();
      }

      async function onConfigChange(config) {
        const baseSize = config.font_size || defaultConfig.font_size;
        const customFont = config.font_family || defaultConfig.font_family;
        const baseFontStack = "system-ui, -apple-system, sans-serif";

        document.getElementById("app").style.backgroundColor =
          config.background_color || defaultConfig.background_color;

        const title = document.getElementById("site-title");
        title.textContent = config.site_title || defaultConfig.site_title;
        title.style.color = config.text_color || defaultConfig.text_color;
        title.style.fontFamily = `${customFont}, ${baseFontStack}`;
        title.style.fontSize = `${baseSize * 1.875}px`;

        const subtitle = document.getElementById("site-subtitle");
        subtitle.textContent =
          config.site_subtitle || defaultConfig.site_subtitle;
        subtitle.style.fontFamily = `${customFont}, ${baseFontStack}`;
        subtitle.style.fontSize = `${baseSize * 0.875}px`;

        const input = document.getElementById("user-input");
        input.placeholder =
          config.placeholder_text || defaultConfig.placeholder_text;
        input.style.fontFamily = `${customFont}, ${baseFontStack}`;
        input.style.fontSize = `${baseSize}px`;

        const buttonText = document.getElementById("button-text");
        buttonText.textContent =
          config.send_button_text || defaultConfig.send_button_text;

        const button = document.getElementById("send-button");
        button.style.fontFamily = `${customFont}, ${baseFontStack}`;
        button.style.fontSize = `${baseSize}px`;
      }

      function init() {
        onConfigChange(defaultConfig);

        document
          .getElementById("chat-form")
          .addEventListener("submit", handleSubmit);
      }

      init();
    </script>

      })();
    </script>
  </body>
</html>
